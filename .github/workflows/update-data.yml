name: Update live pricing data

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch latest pricing from OpenRouter
        run: node scripts/update-prices.mjs
      - name: Commit and deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet src/data/live.json; then
            echo "No pricing changes today."
            exit 0
          fi
          git config user.name "compareai-bot"
          git config user.email "actions@github.com"
          git add src/data/live.json
          git commit -m "chore: daily pricing refresh ($(date -u +%F))"
          git push
          gh workflow run deploy.yml
